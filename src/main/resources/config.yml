# ======================================================
#             Whitelist-Managers Configuration
# ======================================================
#
# GitHub: https://github.com
# Modrinth: https://modrinth.com

# ------------------------------------------------------
# 1. Allowed Whitelist Managers
# ------------------------------------------------------
# List of authorized players who can manage the whitelist.
# We highly recommend managing this list exclusively using
# the console command: '/wladmin <add|remove> <player>'.
allowed-players: []

# ------------------------------------------------------
# 2. Localized Messages & Language Settings
# ------------------------------------------------------
# Translate any system message into your own language here.
# Color codes using standard '&' or '§' symbols are supported.
#
# Placeholders:
#   %player% - The target player name
#   %uuid%   - The target player UUID
messages:
  # In-game permissions error
  no-permission: "&cBu komutu kullanmak için yetkiniz bulunmamaktadır!"
  
  # Console-only command restriction
  console-only: "&c[WL-Admin] Bu komut sadece sunucu konsolundan çalıştırılabilir!"
  
  # Self-removal protection error
  self-removal-denied: "&cKendi kendinizi whitelist'ten çıkaramazsınız!"
  
  # Admin administration messages
  admin-added: "&a[WL-Admin] %player% (%uuid%) adlı oyuncuya whitelist yetkisi verildi."
  admin-already-exists: "&e[WL-Admin] Bu oyuncu zaten yetki listesinde bulunuyor."
  admin-removed: "&a[WL-Admin] %player% adlı oyuncunun whitelist yetkisi geri alındı."
  admin-not-found: "&c[WL-Admin] Yetki listesinde %player% adında bir oyuncu bulunamadı."
  config-reloaded: "&a[WL-Admin] Konfigürasyon dosyası başarıyla yenilendi."
  
  # Whitelist command messages
  whitelist-already-added: "&e%player% zaten whitelist'e ekli."
  whitelist-added: "&a%player% başarıyla whitelist'e eklendi."
  whitelist-already-removed: "&e%player% zaten whitelist'te ekli değil."
  whitelist-removed: "&a%player% başarıyla whitelist'ten çıkarıldı."
  
  # Kick screen message when a player is removed from whitelist
  kick-reason: "&cWhitelist'ten çıkarıldınız!"
