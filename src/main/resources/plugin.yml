name: Whitelist-Managers
version: 1.6.0
main: com.murqin.whitelistmanager.WhitelistManager
api-version: '26.1'
author: Murqin
description: Console-delegated whitelist management plugin.
commands:
  wl:
    description: In-game whitelist add/remove command.
    usage: /wl <add|remove> <player>
  wladmin:
    description: Console-delegated whitelist managers management command.
    usage: /wladmin <add|remove|list|reload>
